name: Perception Mapper AI - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-workspace:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm ci --legacy-peer-deps

    - name: Compile and Build Workspace Applications
      run: npm run build

  validate-nlp-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python NLP Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/nlp-engine/requirements.txt

    - name: Validate Python Modules Syntax
      run: |
        python -m py_compile apps/nlp-engine/main.py apps/nlp-engine/engine.py

  verify-docker-images:
    needs: [validate-workspace, validate-nlp-engine]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Verify Web Frontend Docker Build
      run: docker build -t perception-web:latest -f ./apps/web/Dockerfile .

    - name: Verify NestJS Gateway Docker Build
      run: docker build -t perception-api:latest -f ./apps/api/Dockerfile .

    - name: Verify FastAPI NLP Docker Build
      run: docker build -t perception-nlp:latest -f ./apps/nlp-engine/Dockerfile ./apps/nlp-engine
