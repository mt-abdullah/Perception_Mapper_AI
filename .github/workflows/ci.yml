name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev, develop ]
  pull_request:
    branches: [ main, master, dev, develop ]

jobs:
  lint-test-build:
    name: Lint, Test, and Build Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci --legacy-peer-deps

      - name: Code Quality Auditing (Lint)
        run: npm run lint

      - name: Build Monorepo (Turbo Engine Optimized)
        run: npm run build
